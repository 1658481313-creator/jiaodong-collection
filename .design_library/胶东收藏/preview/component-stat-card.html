<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>数据统计卡 StatCard</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
</head>
<body>
  <div class="pv-page">

    <div class="pv-header">
      <h1>数据统计卡 StatCard</h1>
      <p>平台数据统计展示，浅蓝背景带内含四列白色卡片。</p>
    </div>

    <!-- Section: Stat Band -->
    <div class="pv-section">
      <div class="pv-section__title">统计条</div>
      <div class="pv-demo">
        <div class="jd-stat-band">
          <div class="jd-stat-grid">
            <div class="jd-stat-card">
              <div class="jd-stat-card__number">1,280+</div>
              <div class="jd-stat-card__label">藏品数量</div>
            </div>
            <div class="jd-stat-card">
              <div class="jd-stat-card__number">56</div>
              <div class="jd-stat-card__label">收藏家</div>
            </div>
            <div class="jd-stat-card">
              <div class="jd-stat-card__number">12</div>
              <div class="jd-stat-card__label">覆盖地区</div>
            </div>
            <div class="jd-stat-card">
              <div class="jd-stat-card__number">500+</div>
              <div class="jd-stat-card__label">年份跨度</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="pv-footer">
      <p>胶东收藏 Design Library &middot; Component Preview</p>
    </div>

  </div>
</body>
</html>
