<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图片占位 ImagePlaceholder</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
</head>
<body>
  <div class="pv-page">

    <div class="pv-header">
      <h1>图片占位 ImagePlaceholder</h1>
      <p>藏品图片的加载中、成功、缺失和分类底色占位状态。</p>
    </div>

    <!-- Section: 按分类底色 -->
    <div class="pv-section">
      <div class="pv-section__title">按分类底色</div>
      <div class="pv-demo">
        <div class="grid-4">
          <div>
            <div class="jd-image-placeholder jd-image-placeholder--ceramic">
              <svg class="jd-image-placeholder__icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="8" width="32" height="24" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.3"/><circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="1.5" opacity="0.3"/></svg>
            </div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">陶瓷 #EAF6FC</div>
          </div>
          <div>
            <div class="jd-image-placeholder jd-image-placeholder--jade">
              <svg class="jd-image-placeholder__icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 28c0-8 8-20 16-20s4 12-4 20" stroke="currentColor" stroke-width="1.5" opacity="0.3"/><circle cx="20" cy="16" r="3" stroke="currentColor" stroke-width="1.5" opacity="0.3"/></svg>
            </div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">玉器 #F4FAFD</div>
          </div>
          <div>
            <div class="jd-image-placeholder jd-image-placeholder--bronze">
              <svg class="jd-image-placeholder__icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="1.5" opacity="0.3"/><circle cx="20" cy="20" r="8" stroke="currentColor" stroke-width="1.5" opacity="0.3"/></svg>
            </div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">铜器 #E7F2FA</div>
          </div>
          <div>
            <div class="jd-image-placeholder jd-image-placeholder--light">
              <svg class="jd-image-placeholder__icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="8" width="24" height="24" rx="4" stroke="currentColor" stroke-width="1.5" opacity="0.3"/><line x1="8" y1="16" x2="32" y2="16" stroke="currentColor" stroke-width="1.5" opacity="0.3"/></svg>
            </div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">浅色 surface-200</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Section: 特殊状态 -->
    <div class="pv-section">
      <div class="pv-section__title">特殊状态</div>
      <div class="pv-demo">
        <div class="grid-4">
          <div>
            <div class="jd-image-placeholder jd-skeleton"></div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">加载中 Skeleton</div>
          </div>
          <div>
            <div class="jd-image-placeholder jd-image-placeholder--error">
              <span class="jd-image-placeholder__text">暂无图片</span>
            </div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">缺失状态</div>
          </div>
          <div>
            <div class="jd-image-placeholder jd-skeleton" style="position: relative;">
              <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px;">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;opacity:0.3;"><rect x="4" y="8" width="32" height="24" rx="4" stroke="currentColor" stroke-width="1.5"/><circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="1.5"/></svg>
              </div>
            </div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">加载中 + 图标</div>
          </div>
          <div>
            <div class="jd-image-placeholder jd-skeleton" style="background: linear-gradient(90deg, var(--surface-300) 25%, var(--surface-400) 37%, var(--surface-300) 63%); background-size: 200% 100%; animation: shimmer 2s ease infinite;"></div>
            <div style="padding: 8px 0; font-size: var(--font-size-caption); color: var(--text-primary-300);">慢速骨架屏</div>
          </div>
        </div>
      </div>
    </div>

    <div class="pv-footer">
      <p>胶东收藏 Design Library &middot; Component Preview</p>
    </div>

  </div>
</body>
</html>
