<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>平台提示 Notice</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
</head>
<body>
  <div class="pv-page">

    <div class="pv-header">
      <h1>平台提示 Notice</h1>
      <p>平台定位说明与风险提示，浅蓝底色左侧品牌色边框。</p>
    </div>

    <!-- Section: Notices -->
    <div class="pv-section">
      <div class="pv-section__title">提示信息</div>
      <div class="pv-demo">

        <div class="jd-notice">
          <div class="jd-notice__title">平台定位</div>
          <div class="jd-notice__body">胶东收藏是一个信息展示平台，致力于汇集胶东地区收藏家的藏品信息与收藏动态，提供藏品展示、收藏家介绍与行业资讯服务。平台不参与任何交易行为，不对藏品真伪和价值做出任何判断或担保。</div>
        </div>

        <div class="jd-notice">
          <div class="jd-notice__title">风险提示</div>
          <div class="jd-notice__body">本平台不提供交易服务，不进行藏品鉴定评估，不对藏品信息的准确性、完整性和真实性做出保证。藏品的年代鉴定、品相评估及价值判断均由收藏家个人提供。用户在联系收藏家或进行藏品交流时，请自行判断并承担相应风险。</div>
        </div>

      </div>
    </div>

    <div class="pv-footer">
      <p>胶东收藏 Design Library &middot; Component Preview</p>
    </div>

  </div>
</body>
</html>
