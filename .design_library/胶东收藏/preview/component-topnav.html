<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>页头导航 TopNav</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
</head>
<body>
  <div class="pv-page">

    <div class="pv-header">
      <h1>页头导航 TopNav</h1>
      <p>72px 固定顶部导航，包含品牌名、导航链接和联系按钮。</p>
    </div>

    <!-- Section: Default -->
    <div class="pv-section">
      <div class="pv-section__title">默认状态</div>
      <div class="pv-demo pv-demo--full">
        <nav class="jd-topnav">
          <div class="jd-topnav__inner">
            <span class="jd-topnav__brand">胶东收藏</span>
            <ul class="jd-topnav__links">
              <li><a class="jd-topnav__link jd-topnav__link--active" href="#">首页</a></li>
              <li><a class="jd-topnav__link" href="#">藏品</a></li>
              <li><a class="jd-topnav__link" href="#">收藏家</a></li>
              <li><a class="jd-topnav__link" href="#">动态</a></li>
              <li><a class="jd-topnav__link" href="#">故事</a></li>
            </ul>
            <a class="jd-btn jd-btn--secondary" href="#">联系平台</a>
          </div>
        </nav>
      </div>
    </div>

    <!-- Section: Hover State -->
    <div class="pv-section">
      <div class="pv-section__title">悬停状态预览</div>
      <div class="pv-demo pv-demo--full">
        <nav class="jd-topnav">
          <div class="jd-topnav__inner">
            <span class="jd-topnav__brand">胶东收藏</span>
            <ul class="jd-topnav__links">
              <li><a class="jd-topnav__link" href="#" style="color: var(--navy-500);">首页</a></li>
              <li><a class="jd-topnav__link" href="#" style="color: var(--navy-500);">藏品</a></li>
              <li><a class="jd-topnav__link jd-topnav__link--active" href="#">收藏家</a></li>
              <li><a class="jd-topnav__link" href="#">动态</a></li>
              <li><a class="jd-topnav__link" href="#">故事</a></li>
            </ul>
            <a class="jd-btn jd-btn--secondary" href="#" style="background: var(--surface-200);">联系平台</a>
          </div>
        </nav>
      </div>
    </div>

    <div class="pv-footer">
      <p>胶东收藏 Design Library &middot; Component Preview</p>
    </div>

  </div>
</body>
</html>
