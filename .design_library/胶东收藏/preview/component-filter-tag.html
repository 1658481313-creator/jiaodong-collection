<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>分类标签 FilterTag</title>
  <link rel="stylesheet" href="preview-scaffold.css">
  <link rel="stylesheet" href="../colors_and_type.css">
  <link rel="stylesheet" href="../components.css">
</head>
<body>
  <div class="pv-page">

    <div class="pv-header">
      <h1>分类标签 FilterTag</h1>
      <p>分类筛选标签，支持默认态和选中态。</p>
    </div>

    <!-- Section: 藏品分类 -->
    <div class="pv-section">
      <div class="pv-section__title">藏品分类</div>
      <div class="pv-demo">
        <div class="jd-filter-group">
          <button class="jd-filter-tag jd-filter-tag--active">全部</button>
          <button class="jd-filter-tag">陶瓷</button>
          <button class="jd-filter-tag">玉器</button>
          <button class="jd-filter-tag">铜器</button>
          <button class="jd-filter-tag">书画</button>
          <button class="jd-filter-tag">钱币</button>
          <button class="jd-filter-tag">瓷器</button>
          <button class="jd-filter-tag">杂项</button>
        </div>
      </div>
    </div>

    <!-- Section: 年代筛选 -->
    <div class="pv-section">
      <div class="pv-section__title">年代筛选</div>
      <div class="pv-demo">
        <div class="jd-filter-group">
          <button class="jd-filter-tag">全部年代</button>
          <button class="jd-filter-tag jd-filter-tag--active">清代</button>
          <button class="jd-filter-tag">明代</button>
          <button class="jd-filter-tag">宋代</button>
          <button class="jd-filter-tag">唐代</button>
          <button class="jd-filter-tag">汉代及以前</button>
        </div>
      </div>
    </div>

    <div class="pv-footer">
      <p>胶东收藏 Design Library &middot; Component Preview</p>
    </div>

  </div>
</body>
</html>
