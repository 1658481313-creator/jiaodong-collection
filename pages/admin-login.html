<body class="h-screen overflow-hidden m-0" style="font-family: var(--font-family-default);">
  <main class="flex h-full">
    <!-- Left branding panel -->
    <div class="hidden lg:flex w-[60%] relative items-center justify-center overflow-hidden" style="background: var(--bg-layout);">
      <!-- Main centered content -->
      <div class="relative z-10 text-center px-16 max-w-lg">
        <!-- Logo -->
        <img src="../assets/logo.png" alt="胶东收藏" class="mx-auto mb-8" style="height: 80px; width: auto; object-fit: contain;">

        <p style="font-size: var(--body-lg-font-size); line-height: var(--body-lg-line-height); color: var(--color-text-secondary); letter-spacing: 0.08em;">
          传承文化 · 珍藏历史
        </p>
      </div>
    </div>

    <!-- Right login form panel -->
    <div class="w-full lg:w-[40%] flex items-center justify-center" style="background: var(--bg-layout);">
      <div class="w-full max-w-[400px] mx-4 rounded-lg p-8 lg:p-10" style="background: var(--bg-container); box-shadow: var(--box-shadow-tertiary); border-radius: var(--radius-8);">
        <!-- Brand header -->
        <div class="mb-8 text-center">
          <p style="font-size: var(--heading-sm-font-size); font-weight: var(--heading-sm-font-weight); color: var(--color-text-secondary);">
            后台管理系统
          </p>
        </div>

        <!-- Login form -->
        <div class="flex flex-col gap-5">
          <!-- Username field -->
          <div class="flex flex-col gap-2">
            <label style="font-size: var(--body-base-font-size); color: var(--color-text);">用户名</label>
            <input type="text" placeholder="请输入用户名"
                   class="w-full h-10 px-[11px] rounded-md border outline-none transition-[border-color,box-shadow] bg-[var(--bg-container)] text-[var(--color-text)] focus:border-[var(--color-primary)] focus:shadow-[0_0_0_2px_rgba(22,119,255,0.1)] placeholder:text-[var(--color-text-placeholder)]"
                   style="font-size: var(--body-base-font-size);">
          </div>

          <!-- Password field -->
          <div class="flex flex-col gap-2">
            <label style="font-size: var(--body-base-font-size); color: var(--color-text);">密码</label>
            <input type="password" placeholder="请输入密码"
                   class="w-full h-10 px-[11px] rounded-md border outline-none transition-[border-color,box-shadow] bg-[var(--bg-container)] text-[var(--color-text)] focus:border-[var(--color-primary)] focus:shadow-[0_0_0_2px_rgba(22,119,255,0.1)] placeholder:text-[var(--color-text-placeholder)]"
                   style="font-size: var(--body-base-font-size);">
          </div>

          <!-- Remember me checkbox -->
          <div class="flex items-center gap-2">
            <input type="checkbox" class="accent-[var(--color-primary)]" style="width: 16px; height: 16px;">
            <label style="font-size: var(--body-base-font-size); color: var(--color-text); cursor: pointer;">记住我</label>
          </div>

          <!-- Login button -->
          <button type="button"
                  class="w-full h-10 rounded-lg cursor-pointer transition-colors duration-[var(--motion-duration-mid)] bg-[var(--color-primary)] hover:bg-[var(--color-primary-hover)] active:bg-[var(--color-primary-active)] text-[var(--bg-container)] border-0"
                  style="font-size: var(--body-lg-font-size); font-weight: var(--font-weight-strong);">
            登录
          </button>
        </div>

      </div>
    </div>
  </main>
  <script>lucide.createIcons();</script>
</body>
